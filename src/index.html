<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DebianFlix - SAE 2.03</title>
	<style>
		body {
			background-color: #141414;
			color: white;
			font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		header {
			width: 100%;
			padding: 20px 50px;
			background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
			box-sizing: border-box;
		}
		h1 {
			color: #E50914;
			margin: 0;
			font-size: 2.5em;
		}
		.subtitle {
			color: #999;
			margin-top: 5px;
			font-size: 1.1em;
		}
		.video-container {
			margin-top: 50px;
			width: 80%;
			max-width: 900px;
			background-color: #000;
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
		}
		video {
			width: 100%;
			display: block;
		}
		.info {
			margin-top: 20px;
			text-align: center;
			max-width: 800px;
		}
	</style>
</head>
<body>

	<header>
		<h1>DebianFlix</h1>
		<div class="subtitle">Projet SAE 2.03 - Service de Vidéo à la Demande Dockerisé</div>
	</header>

	<div class="video-container">
		<video controls poster="https://via.placeholder.com/900x500/000000/FFFFFF/?text=DebianFlix+Originals">
			<source src="video.mp4" type="video/mp4">
			Votre navigateur ne supporte pas la vidéo.
		</video>
	</div>

	<div class="info">
		<h2>Bienvenue sur le service réseau de notre équipe</h2>
		<p>Ce serveur web Nginx tourne de manière isolée dans un conteneur Debian 12.</p>
	</div>

</body>
</html>
